<!DOCTYPE html>
<html>

<head>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>🌈 Kids Learning Fun 🎨</h1>
    <p>👶 Learn ABC, Numbers & Colors!</p>


    <h2>Choose a Game 🎮</h2>

<div class="games">

    <div class="card" onclick="alphabetGame()">
        <h3>🔤 Alphabet</h3>
        <p>A B C</p>
    </div>

    <div class="card" onclick="numberGame()">
        <h3>🔢 Numbers</h3>
        <p>1 2 3</p>
    </div>

    <div class="card" onclick="colorGame()">
        <h3>🎨 Colors</h3>
        <p>🌈 Fun Colors</p>
    </div>

</div>



    <script src="script.js"></script>

</body>
</html>
